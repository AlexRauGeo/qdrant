# Mamook CLAW — Qdrant Standalone Configuration
# Deployed across Mac Mini M4, Dell Proxmox, Omen Proxmox
# https://qdrant.tech/documentation/guides/configuration/

service:
  http_port: 6333
  grpc_port: 6334
  # Bind to all interfaces for Docker/LXC networking
  host: 0.0.0.0
  # Enable CORS for n8n webhooks and local dev
  enable_cors: true

storage:
  storage_path: /qdrant/storage
  # Mamook workloads: moderate vector count, high recall priority
  optimizers:
    default_segment_number: 2
    max_segment_size_kb: 200000
    memmap_threshold_kb: 200000
    indexing_threshold_kb: 20000
    flush_interval_sec: 5

telemetry_disabled: true
